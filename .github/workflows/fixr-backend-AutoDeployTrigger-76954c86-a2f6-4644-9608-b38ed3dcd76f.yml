name: Trigger auto deployment for fixr-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/fixr-backend-AutoDeployTrigger-76954c86-a2f6-4644-9608-b38ed3dcd76f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FIXRBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FIXRBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FIXRBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: fixrregistry21744.azurecr.io
          registryUsername: ${{ secrets.FIXRBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FIXRBACKEND_REGISTRY_PASSWORD }}
          containerAppName: fixr-backend
          resourceGroup: exinta-tria
          imageToBuild: fixrregistry21744.azurecr.io/fixr-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


